  <g transform="translate(168 54)">
    <path d="M54 18c0-8 6-14 14-14s14 6 14 14" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 34h112" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
    <path d="M64 18v16" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
    <path d="M28 40c10 6 22 8 36 8s26-2 36-8l10 96c-14 14-34 22-46 22s-32-8-46-22l10-96z" fill="url(#dress)"/>
    <path d="M48 78h32" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".45"/>
  </g>
  <!-- spark marks -->
  <path d="M112 52l3 7 7 3-7 3-3 7-3-7-7-3 7-3 3-7z" fill="#F25123" opacity=".35"/>
  <path d="M236 48l2 5 5 2-5 2-2 5-2-5-5-2 5-2 2-5z" fill="#F25123" opacity=".45"/>
