  </defs>
  <rect x="24" y="24" width="272" height="192" rx="28" fill="url(#sky)"/>
  <circle cx="78" cy="68" r="18" fill="#FFD8C8" opacity=".85"/>
  <circle cx="250" cy="176" r="28" fill="#FFE7DC" opacity=".9"/>
  <!-- ticket / booking card -->
  <g transform="translate(48 78)">
    <rect x="0" y="0" width="108" height="78" rx="14" fill="#fff" stroke="#E8D5CB" stroke-width="2"/>
    <path d="M108 28c-6 0-10 4-10 11s4 11 10 11" stroke="#E8D5CB" stroke-width="2"/>
    <path d="M18 20h48M18 34h36M18 48h42" stroke="#F25123" stroke-width="3" stroke-linecap="round" opacity=".55"/>
    <circle cx="86" cy="22" r="7" fill="#FFE0D4"/>
  </g>
