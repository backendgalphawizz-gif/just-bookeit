      <stop stop-color="#FFF4EF"/>
      <stop offset="1" stop-color="#F7E8E1"/>
    </linearGradient>
    <linearGradient id="dress" x1="150" y1="70" x2="210" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F25123"/>
      <stop offset="1" stop-color="#C93A12"/>
